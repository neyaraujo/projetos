<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pefil</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/principal.css">
    <link rel="stylesheet" href="assets/css/geral.css">
    <style>
        .navigation li:nth-child(2) a {
            color: cadetblue;
        }
        body {
            height: 100vh;
            background: #4D33DE;
        }
        header {
            position: sticky;
            top: 0;
        }
        main {
            
        }
        main .perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        main .perfil .header {
            width: 100%;
            background: rgb(226, 226, 226);
            padding: 20px;
            text-align: left;
        }

        main .perfil img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }

        main .perfil h1  {
            color: rgb(0, 49, 141);
            font-size: 1.5rem;
            font-weight: 400;
        }

        main .perfil .foto {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        main .perfil .foto a {
            color: rgb(255, 255, 255);
            padding: 5px;
            font-style: italic;
        }
        
        main .perfil button {
            padding: 10px 20px;
        }
        
    </style>
    <link rel="stylesheet" href="assets/css/perfil.css">
</head>
<body>
    <header>
        <nav class="navigation">
            <a class="logo" href="">CURRICULO ONLINE</a>
            <ul class="nav-menu">
                <li lang="nav-item"><a href="principal.html">Home</a></li>
                <li lang="nav-item"><a href="#">Pefil</a></li>
                <li lang="nav-item"><a href="#">Formação</a></li>
                <li lang="nav-item"><a href="#">Cursos</a></li>
                <li lang="nav-item"><a href="#">Currículo</a></li>
                <li lang="nav-item"><a href="#">Download</a></li>
            </ul>
            <div class="login">
                <img class="login-foto" src="assets/images/favicon.png" alt="foto perfil" width="26px">
                <a href="#">Sair</a>
            </div>
            <div class="menu">
                <span class="material-symbols-outlined">menu</span>
            </div>
        </nav>
    </header>
    <main>
        <section class="perfil">
            <div class="header">
                <h1>Franciney de Jesus Araujo</h1>
            </div>
            <div class="foto">
                <img src="assets/images/favicon.png" alt="">
                <a>Nenhum arquivo selecionado...</a>
                <button class="btn-primary">Escolher foto</button>
            </div>
        </section>
        <section>
<form class="form" action="#" id="form">
            <div class="form-content">
                <label for="nome"><sup>*</sup>Nome Completo</label>
                <input 
                type="text" 
                name="nome" 
                id="nome"
                placeholder="Digite seu nome completo"/>
                <a></a>
            </div>
            <div class="form-content">
                <label for="nacionalidade">Nacionalidade</label>
                <input 
                type="text" 
                name="nacionalidade" 
                id="nacionalidade"
                value="Brasileiro(a)"/>
                <a></a>
            </div>
            <div class="form-content">
                <label for="estado-civil">Estado Civil</label>
                <select id="estado-civil" name="estado-civil">
                    <option value="Solteiro">Solteiro(a)</option>
                    <option value="Solteiro">Casado(a)</option>
                    <option value="Solteiro">Viúvo(a)</option>
                    <option value="Solteiro">Divorciado(a)</option>
                </select>
                <a></a>
            </div>
            <div class="form-content">
                <label for="idade">Idade</label>
                <input 
                type="number" 
                name="idade" 
                id="idade"
                step="1"
                min="1"
                placeholder="Digite sua idade"/>
                <a></a>
            </div>
            <div class="form-content">
                <label for="endereco">Endereço completo</label>
                <input 
                type="text" 
                name="endereco" 
                id="endereco"
                placeholder="Rua, Travessa, Quadra..."/>
                <a></a>
            </div>
            <div class="form-content">
                <label for="celular">Celular</label>
                <input 
                type="tel" 
                name="celular" 
                id="celular"
                placeholder="(98) xxxx-xxx"/>
                <a></a>
            </div>
            <div class="form-content">
                <label for="email"><sup>*</sup>E-mail</label>
                <input 
                type="email" 
                name="email" 
                id="email"
                autocomplete="email"
                placeholder="exemplo@gmail.com"/>
                <a></a>
            </div>
            <button class="btn-primary" type="submit">Cadastrar</button>
        </form>
        </section>
    </main>
    <footer class="footer">
        <p>&copy;<span id="ano"></span> Franciney Araujo. All rights reserved.</p>
    </footer>        


</body>
</html>
