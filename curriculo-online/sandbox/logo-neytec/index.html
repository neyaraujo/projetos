<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* outline: 1px solid red; */
        }
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif
        }
        .logo__container {
            display: inline-block; 
        }
        .logo__marca {
            position: relative;
            display: inline-block;
            text-align: justify;
            font-size: 26px;
            color: #012A56;
        }
        .logo__linha {
            position: absolute;
            bottom: 1px;
            right: 0;
            
            width: 50px;
            height: 2px;
            background: #1E78BB;
        }
        .logo__slogan {
            font-size: 6px;
            color: #012A56;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div class="logo__container">
        <h1 class="logo__marca">NEY-TEC
            <div class="logo__linha"></div>
        </h1>
        <p class="logo__slogan">AUTOMAÇÃO & APLICAÇÃO WEB</p>
    </div>
</body>
</html>
