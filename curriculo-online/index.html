<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Currículo Online</title>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>

    <main class="login-container">
        <section class="login-card">
            <header class="login-header">
                <div class="logo-circle">
                    <img src="assets/images/favicon.png" alt="Ícone de perfil e documentos">
                </div>
                <h1>Currículo Online - Login</h1>
            </header>

            <form action="#" method="POST" class="login-form" id="form">
                <div class="input-group">
                    <div class="field">
                        <label for="email" class="sr-only">E-mail</label>
                        <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="E-mail" 
                        autofocus 
                        required
                        >
                        <a>Resposta</a>
                    </div>
                    
                    <div class="field password-field" >
                        <label for="password" class="sr-only">Senha</label>
                        <input 
                        type="password" 
                        id="senha" 
                        name="senha" 
                        placeholder="Senha" 
                        required
                        min="6"
                        >
                        <a>Resposta</a>
                    </div>

                </div>                
                <button type="submit" class="btn-login">Entrar</button>
                <div class="registration-area">
                    <span>Não tem login?</span>
                    <a href="cadastrar-usuario.html" class="btn-signup">Cadastre-se</a>
                </div>
                
            </form>

            <footer class="login-footer">
                <p>&copy;<span id="ano"></span> Franciney Araujo. All rights reserved.</p>
            </footer>
        </section>
    </main>
    <script src="assets/js/login-validacao.js"></script>
</body>
</html>
